services:
  postgres:
    image: postgres:16-alpine
    container_name: livraison_db
    environment:
      POSTGRES_DB: livraison_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: livraison_backend
    ports:
      - "8000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/livraison_db
      JWT_SECRET: dev_secret_change_in_prod
      PLATFORM_COMMISSION: "0.10"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: livraison_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://backend:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
